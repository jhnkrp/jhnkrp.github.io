<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil de Maquina Virtual</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">

        <header>
            <h1>Hola 👋 Soy</h1>
            <h2>Tu Nombre Aquí</h2>
            <p>Administrador de Sistemas / DevOps</p>
        </header>

        <section class="info">
            <div class="box">
                <h3>📍 Ubicación</h3>
                <p>Ciudad, País</p>
            </div>

            <div class="box">
                <h3>📧 Contacto</h3>
                <p>email@tu.com</p>
            </div>

            <div class="box">
                <h3>💻 Perfil</h3>
                <p>Administrador de sistemas, experto en VMs e infraestructura.</p>
            </div>

            <div class="box">
                <h3>🖥 Máquina Virtual</h3>
                <p>Resolución: <span id="vm-res">-- x --</span></p>
            </div>
        </section>

    </div>

    <!-- Script para mostrar resolución de VM -->
    <script>
        const width = window.screen.width;
        const height = window.screen.height;
        document.getElementById('vm-res').textContent = `${width} × ${height}`;
    </script>
</body>
</html>
